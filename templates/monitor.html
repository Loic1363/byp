<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Monitor — Captcha Solver</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0A0503;
  --card:   #1C0E06;
  --border: #422010;
  --text:   #D4B490;
  --muted:  #7A5030;
  --accent: #C89632;
  --green:  #6DC86A;
  --red:    #E07070;
  --gold:   #D4A428;
  --orange: #C86832;
  --cyan:   #7AA8A5;
  --sw:     210px;
}
html, body { height: 100%; }
body {
  font-family: 'Consolas', 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sw);
  background: #130804;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  inset: 0 auto 0 0;
  z-index: 20;
}
.brand {
  padding: 22px 18px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), #6B2C0A);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: bold; color: #0A0503;
  letter-spacing: 1px; flex-shrink: 0;
}
.brand-name { font-size: 0.82rem; color: var(--text); letter-spacing: 1.5px; }
.brand-sub  { font-size: 0.62rem; color: var(--muted); margin-top: 1px; }
nav { flex: 1; padding: 14px 10px; display: flex; flex-direction: column; gap: 2px; }
.nav-item {
  width: 100%; padding: 9px 13px;
  border: none; border-radius: 5px;
  background: transparent; color: var(--muted);
  font-family: inherit; font-size: 0.83rem;
  text-align: left; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: background 0.12s, color 0.12s;
  text-decoration: none;
}
.nav-item:hover  { background: var(--card); color: var(--text); }
.nav-item.active { background: #2A1208; color: var(--accent); }
.nav-icon { font-style: normal; width: 16px; text-align: center; font-size: 0.9rem; }

/* ── TOP BAR ── */
#topbar {
  margin-left: var(--sw);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 10px 20px;
  background: #0D0804;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.tb-brand { font-size: 0.78rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
.tb-sep   { width: 1px; height: 22px; background: var(--border); }

.status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot-running { background: var(--accent); animation: pulse 1s infinite; }
.dot-waiting { background: var(--gold);   animation: pulse 1.5s infinite; }
.dot-idle    { background: var(--muted); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

#tb-status { font-size: 0.83rem; color: var(--text); }
#tb-cycle  { font-size: 0.78rem; color: var(--muted); }
#tb-countdown { font-size: 1rem; color: var(--gold); font-weight: bold; letter-spacing: 1px; }

.tb-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
#tb-ocr   { font-size: 1.1rem; color: var(--accent); letter-spacing: 4px; font-weight: bold; }
.tb-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

/* ── MAIN SPLIT ── */
#main {
  margin-left: var(--sw);
  flex: 1;
  display: flex;
  min-height: 0;
}

/* ── LEFT PANEL (images) ── */
#panel-images {
  width: 380px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── WAITING CARD ── */
#wait-card {
  display: none;
  background: #180A04;
  border: 1px solid #5A2C10;
  border-radius: 8px;
  padding: 20px 16px;
  text-align: center;
}
#wait-card.visible { display: block; }
.wc-title  { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }
.wc-icon   { font-size: 1.4rem; margin-bottom: 8px; }
.wc-big    { font-size: 2.4rem; font-weight: bold; color: var(--gold); letter-spacing: 3px; font-variant-numeric: tabular-nums; line-height: 1.1; margin-bottom: 8px; }
.wc-target { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
.wc-cycle  { font-size: 0.68rem; color: #4A2810; }

.img-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.img-card-title {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  padding: 8px 12px 6px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.img-card-title .age { font-size: 0.58rem; color: #4A2810; }
.img-card img {
  display: block;
  width: 100%;
  image-rendering: pixelated;
  background: #0A0503;
}
.img-placeholder {
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #4A2810;
  font-size: 0.75rem;
}

/* ── RIGHT PANEL (terminal) ── */
#panel-log {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

#log-toolbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: #0D0804;
  border-bottom: 1px solid var(--border);
}
.log-toolbar-title { font-size: 0.63rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
#conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
#conn-dot.connected { background: var(--green); }
#conn-label { font-size: 0.68rem; color: var(--muted); }
.tb-btn {
  margin-left: auto;
  padding: 4px 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  font-family: inherit;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.15s;
}
.tb-btn:hover { border-color: var(--muted); color: var(--text); }
.tb-btn.active { border-color: var(--gold); color: var(--gold); }

#terminal {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  font-size: 0.78rem;
  line-height: 1.6;
  background: #080503;
}

.log-line { white-space: pre-wrap; word-break: break-all; color: #B09070; }
.log-line.l-cycle  { color: var(--accent); font-weight: bold; border-top: 1px solid #2C1608; margin-top: 4px; padding-top: 4px; }
.log-line.l-ok     { color: var(--green); }
.log-line.l-err    { color: var(--red); }
.log-line.l-warn   { color: var(--orange); }
.log-line.l-portal { color: var(--muted); }
.log-line.l-ocr    { color: var(--accent); font-weight: bold; }
.log-line.l-sep    { color: #2C1608; }
.log-line.l-sys    { color: #4A2810; font-style: italic; }
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="brand">
    <div class="brand-mark">CS</div>
    <div>
      <div class="brand-name">CAPTCHA</div>
      <div class="brand-sub">Automation Tool</div>
    </div>
  </div>
  <nav>
    <a class="nav-item" href="/"><i class="nav-icon">◈</i> App</a>
    <a class="nav-item active" href="/monitor"><i class="nav-icon">⌨</i> Monitor</a>
  </nav>
</aside>

<!-- ── TOP BAR ── -->
<div id="topbar">
  <span class="tb-brand">Monitor</span>
  <div class="tb-sep"></div>
  <div class="status-dot dot-idle" id="tb-dot"></div>
  <span id="tb-status">Connexion…</span>
  <span id="tb-cycle" style="display:none"></span>
  <span id="tb-countdown" style="display:none"></span>
  <div class="tb-right">
    <span class="tb-label">Dernier OCR</span>
    <span id="tb-ocr">—</span>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="main">

  <!-- Images -->
  <div id="panel-images">

    <!-- Waiting countdown card (visible only when state=waiting) -->
    <div id="wait-card">
      <div class="wc-title">Vote réussi — prochain cycle dans</div>
      <div class="wc-icon">✅</div>
      <div class="wc-big" id="wc-countdown">—</div>
      <div class="wc-target" id="wc-target"></div>
      <div class="wc-cycle" id="wc-cycle"></div>
      <button id="btn-skip-card" onclick="skipWait()" style="margin-top:14px;width:100%;padding:9px;background:#1A0A04;border:1px solid #5A2C10;border-radius:5px;color:var(--gold);font-family:inherit;font-size:0.82rem;cursor:pointer;letter-spacing:0.5px;" onmouseover="this.style.background='#2A1508'" onmouseout="this.style.background='#1A0A04'">
        ⏭ Lancer maintenant (test)
      </button>
    </div>

    <div class="img-card" id="card-capture">
      <div class="img-card-title">
        <span>Captcha capturé</span>
        <span class="age" id="age-capture">—</span>
      </div>
      <div class="img-placeholder" id="ph-capture">aucune capture</div>
      <img id="img-capture" style="display:none" alt="captcha" />
    </div>

    <div class="img-card" id="card-verify">
      <div class="img-card-title">
        <span>Zone vérification</span>
        <span class="age" id="age-verify">—</span>
      </div>
      <div class="img-placeholder" id="ph-verify">aucune vérif</div>
      <img id="img-verify" style="display:none" alt="verify" />
    </div>
  </div>

  <!-- Terminal -->
  <div id="panel-log">
    <div id="log-toolbar">
      <span class="log-toolbar-title">Terminal</span>
      <div id="conn-dot"></div>
      <span id="conn-label">déconnecté</span>
      <button class="tb-btn" id="btn-skip-tb" onclick="skipWait()" disabled title="Actif uniquement pendant l'attente entre deux cycles">⏭ Skip attente</button>
      <button class="tb-btn" id="btn-freeze" onclick="toggleFreeze()">⏸ Freeze</button>
      <button class="tb-btn" onclick="clearLog()">✕ Vider</button>
    </div>
    <div id="terminal"></div>
  </div>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let frozen    = false;
let waitUntil = 0;
let liveState = 'idle';
let captureTs = 0, verifyTs = 0;

// ─── SSE ──────────────────────────────────────────────────────────────────────
function connectSSE() {
  const src = new EventSource('/stream');

  src.addEventListener('log', e => appendLog(e.data));

  src.addEventListener('capture', () => {
    captureTs = Date.now();
    loadImage('capture');
  });

  src.addEventListener('verify', () => {
    verifyTs = Date.now();
    loadImage('verify');
  });

  src.onopen = () => {
    setConn(true);
    appendLog('[monitor connecté]', 'l-sys');
  };

  src.onerror = () => {
    setConn(false);
    appendLog('[connexion perdue — reconnexion dans 5s…]', 'l-err');
    src.close();
    setTimeout(connectSSE, 5000);
  };
}

connectSSE();

// ─── Log ──────────────────────────────────────────────────────────────────────
function stripAnsi(s) {
  return s.replace(/\x1b\[[0-9;]*m/g, '');
}

function classifyLine(raw) {
  const s = raw.toLowerCase();
  if (s.includes('─') || s.match(/^-{10,}/)) return 'l-sep';
  if (s.includes('cycle ') && (s.includes('──') || s.match(/cycle \d+/))) return 'l-cycle';
  if (s.includes('[portal]') || s.includes('[capture]')) return 'l-portal';
  if (s.includes('[monitor') || s.includes('[connexion')) return 'l-sys';
  if (s.includes('texte détecté') || s.includes('nouveau texte') || s.includes('ocr')) return 'l-ocr';
  if (s.includes('✅') || s.includes('success') || s.includes('ok (') || s.includes('portail xdg ok') || s.includes('vote réussi')) return 'l-ok';
  if (s.includes('❌') || s.includes('erreur') || s.includes('noir') || s.includes('timeout') || s.includes('échec')) return 'l-err';
  if (s.includes('❓') || s.includes('unknown') || s.includes('vide') || s.includes('retry')) return 'l-warn';
  if (s.includes('cycle ')) return 'l-cycle';
  return '';
}

function appendLog(raw, forceClass) {
  const term = document.getElementById('terminal');
  const line = stripAnsi(raw);
  const div  = document.createElement('div');
  div.className = 'log-line ' + (forceClass || classifyLine(raw));
  div.textContent = line;
  term.appendChild(div);
  if (!frozen) term.scrollTop = term.scrollHeight;
  while (term.children.length > 2000) term.removeChild(term.firstChild);

  // Extract OCR text from log
  const m = line.match(/Texte détecté\s*:\s*(\S+)|Nouveau texte\s*:\s*(\S+)/i);
  if (m) {
    const ocr = (m[1] || m[2]).replace(/[()]/g, '');
    document.getElementById('tb-ocr').textContent = ocr;
  }
}

function clearLog() {
  document.getElementById('terminal').innerHTML = '';
}

function toggleFreeze() {
  frozen = !frozen;
  const btn = document.getElementById('btn-freeze');
  btn.classList.toggle('active', frozen);
  btn.textContent = frozen ? '▶ Reprendre' : '⏸ Freeze';
  if (!frozen) {
    const term = document.getElementById('terminal');
    term.scrollTop = term.scrollHeight;
  }
}

// ─── Images ───────────────────────────────────────────────────────────────────
function loadImage(type) {
  const img = document.getElementById('img-' + type);
  const ph  = document.getElementById('ph-' + type);
  const ts  = type === 'capture' ? captureTs : verifyTs;
  img.onload = () => { img.style.display = 'block'; ph.style.display = 'none'; };
  img.onerror = () => {};
  img.src = '/img/' + type + '?t=' + ts;
}

function fmtAge(ts) {
  if (!ts) return '—';
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 60) return s + 's';
  return Math.floor(s/60) + 'm' + (s%60) + 's';
}

setInterval(() => {
  if (captureTs) document.getElementById('age-capture').textContent = fmtAge(captureTs);
  if (verifyTs)  document.getElementById('age-verify').textContent  = fmtAge(verifyTs);
}, 1000);

// ─── Status polling ───────────────────────────────────────────────────────────
function fmtRemaining(secs) {
  if (secs <= 0) return '00:00';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
  return `${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

async function pollStatus() {
  try {
    const st = await (await fetch('/status')).json();
    liveState = st.state;

    document.getElementById('tb-dot').className = 'status-dot dot-' + st.state;
    document.getElementById('tb-status').textContent = st.msg || st.state;

    const cycleEl = document.getElementById('tb-cycle');
    if (st.cycle > 0) {
      cycleEl.style.display = 'inline';
      cycleEl.textContent = `cycle ${st.cycle}`;
    } else {
      cycleEl.style.display = 'none';
    }

    const cdEl     = document.getElementById('tb-countdown');
    const waitCard = document.getElementById('wait-card');
    const skipTb   = document.getElementById('btn-skip-tb');
    if (st.state === 'waiting' && st.wait_until > 0) {
      waitUntil = st.wait_until;
      cdEl.style.display = 'inline';
      skipTb.disabled    = false;
      waitCard.classList.add('visible');
      const targetTime = new Date(st.wait_until * 1000).toLocaleTimeString('fr-FR');
      document.getElementById('wc-target').textContent = `Prochain vote à ${targetTime}`;
      document.getElementById('wc-cycle').textContent  = st.cycle > 0 ? `Cycle ${st.cycle} terminé` : '';
    } else if (st.state !== 'waiting') {
      waitUntil = 0;
      cdEl.style.display = 'none';
      skipTb.disabled    = true;
      waitCard.classList.remove('visible');
    }
  } catch {}
}

setInterval(pollStatus, 3000);
pollStatus();

// Countdown tick (every second)
setInterval(() => {
  if (waitUntil > 0) {
    const remaining = Math.max(0, Math.round(waitUntil - Date.now() / 1000));
    const fmt = fmtRemaining(remaining);
    document.getElementById('tb-countdown').textContent = '⏳ ' + fmt;
    document.getElementById('wc-countdown').textContent = fmt;
  }
}, 1000);

// ─── Skip wait ────────────────────────────────────────────────────────────────
async function skipWait() {
  const res  = await fetch('/skip_wait', {method: 'POST'});
  const data = await res.json();
  if (data.ok) {
    appendLog('[monitor] ⏭ Timer avancé — relance dans 3s…', 'l-warn');
  } else {
    appendLog(`[monitor] Impossible : ${data.msg || 'pas en attente'}`, 'l-sys');
  }
}

// ─── Connection indicator ──────────────────────────────────────────────────────
function setConn(ok) {
  document.getElementById('conn-dot').className   = ok ? 'connected' : '';
  document.getElementById('conn-label').textContent = ok ? 'connecté' : 'déconnecté';
}
</script>
</body>
</html>
