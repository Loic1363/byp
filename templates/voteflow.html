<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VoteFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ font-family:'IBM Plex Sans',system-ui,sans-serif; color:#211c12; background:#E9E6DD; }
  button{ font-family:inherit; }
  .mono{ font-family:'IBM Plex Mono',monospace; }
  @keyframes livepulse { 0%,100%{ box-shadow:0 0 0 0 rgba(16,185,129,.5);} 50%{ box-shadow:0 0 0 5px rgba(16,185,129,0);} }
  @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  input[type=range]{ -webkit-appearance:none; appearance:none; height:6px; border-radius:999px; outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:#9F7420; border:2px solid #fff; box-shadow:0 1px 3px rgba(60,48,20,.45); cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:16px; height:16px; border-radius:50%; background:#9F7420; border:2px solid #fff; box-shadow:0 1px 3px rgba(60,48,20,.45); cursor:pointer; }
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background:#d8cdb6; border-radius:6px; border:2px solid transparent; background-clip:padding-box; }
</style>
</head>
<body>
<div id="root"></div>
<script src="/static/app.js" defer></script>
</body>
</html>
